<style>

<body class="bg-gray-50 min-h-screen">

<!-- 立即显示的启动画面（Tailwind 加载前可见） -->
<div id="splash" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,sans-serif;">
  <div style="text-align:center;">
    <div style="font-size:56px;margin-bottom:16px;">📦</div>
    <div style="font-size:18px;font-weight:700;color:#1e293b;margin-bottom:6px;">退货订单管理</div>
    <div style="font-size:13px;color:#94a3b8;">数据加载中...</div>
    <div style="margin-top:16px;width:120px;height:3px;background:#e2e8f0;border-radius:2px;margin-left:auto;margin-right:auto;overflow:hidden;">
      <div style="width:40%;height:100%;background:#3b82f6;border-radius:2px;animation:splashBar 1.2s ease infinite;"></div>
    </div>
  </div>
</div>
<style>@keyframes splashBar{0%{margin-left:0}50%{margin-left:60%}100%{margin-left:0}}</style>

<!-- 主界面 -->
<div id="app" style="display:none">

<div id="toast" style="display:none"></div>

<!-- Header -->
<header class="bg-white shadow-sm sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <h1 class="text-lg md:text-xl font-bold text-gray-800">📦 退货订单管理</h1>
      <button onclick="refreshOrders()" id="refreshBtn" class="btn btn-sm bg-gray-100 text-gray-500" title="刷新数据">
        <i class="fa fa-refresh"></i> <span class="hidden md:inline text-xs" id="lastRefresh"></span>
      </button>
    </div>
    <button class="btn btn-primary" onclick="showCreateModal()">
      <i class="fa fa-plus"></i> <span class="hidden md:inline">新建订单</span>
    </button>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-4">
  <!-- Filters -->
  <div class="bg-white rounded-xl p-4 mb-4 shadow-sm">
    <div class="flex flex-wrap gap-2">
      <input id="searchInput" class="input flex-1 min-w-[160px]" placeholder="🔍 搜索订单号 / 快递单号 / 账号">
      <select id="filterStrategy" class="input w-auto min-w-[110px]" onchange="renderOrders()">
        <option value="">全部策略</option>
        <option value="销毁">销毁</option>
        <option value="上门取件">上门取件</option>
        <option value="自行寄回">自行寄回</option>
        <option value="暂存仓库">暂存仓库</option>
      </select>
      <select id="filterStatus" class="input w-auto min-w-[110px]" onchange="renderOrders()">
        <option value="">全部状态</option>
      </select>
    </div>
  </div>

  <!-- Stats -->
  <div id="statsBar" class="flex flex-wrap gap-3 mb-4 text-sm text-gray-500"></div>

  <!-- Loading -->
  <div id="loading" class="text-center py-12 text-gray-400"></div>

  <!-- Table (Desktop) -->
  <div class="bg-white rounded-xl shadow-sm overflow-hidden table-col">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="bg-gray-50 text-left text-sm text-gray-500 border-b">
            <th class="px-4 py-3 font-medium">订单编号</th>
            <th class="px-4 py-3 font-medium">购买账号</th>
            <th class="px-4 py-3 font-medium">国内快递单号</th>
            <th class="px-4 py-3 font-medium">处理策略</th>
            <th class="px-4 py-3 font-medium">当前状态</th>
            <th class="px-4 py-3 font-medium">更新时间</th>
            <th class="px-4 py-3 font-medium">操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Cards (Mobile) -->
  <div id="cardsView" class="card-view space-y-3" style="display:none;"></div>

  <!-- Empty -->
  <div id="emptyState" class="text-center py-16 text-gray-400" style="display:none">
    <div class="text-5xl mb-3">📭</div>
    <p>暂无订单数据</p>
    <button class="btn btn-primary mt-3" onclick="showCreateModal()">+ 新建第一笔订单</button>
  </div>
</main>

<!-- Create Modal -->
<div id="createModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)hideCreateModal()">
  <div class="modal">
    <h2 class="text-lg font-bold text-gray-800 mb-4" id="createModalTitle">新建订单</h2>
    <div class="space-y-3">
      <div>
        <label class="text-sm text-gray-600 mb-1 block">订单编号 <span class="text-red-400">*</span></label>
        <input id="createOrderNo" class="input" placeholder="输入订单编号" oninput="debounceAutoFill()">
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">购买账号</label>
        <input id="createAccount" class="input" placeholder="输入购买账号（选填）">
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">国内快递单号</label>
        <input id="createTrackingNo" class="input" placeholder="输入国内快递单号（选填）">
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">处理策略 <span class="text-red-400">*</span></label>
        <select id="createStrategy" class="input">
          <option value="">请选择策略</option>
          <option value="销毁">销毁</option>
          <option value="上门取件">上门取件</option>
          <option value="自行寄回">自行寄回</option>
          <option value="暂存仓库">暂存仓库</option>
        </select>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-5">
      <button class="btn bg-gray-100 text-gray-600" onclick="hideCreateModal()">取消</button>
      <button class="btn btn-primary" onclick="createOrder()">确认创建</button>
    </div>
  </div>
</div>

<!-- Status Modal -->
<div id="statusModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)hideStatusModal()">
  <div class="modal">
    <h2 class="text-lg font-bold text-gray-800 mb-1">更新状态</h2>
    <p class="text-sm text-gray-500 mb-4" id="statusModalOrderInfo"></p>
    <div>
      <label class="text-sm text-gray-600 mb-1 block">选择新状态</label>
      <select id="newStatus" class="input"></select>
    </div>
    <div class="flex justify-end gap-2 mt-5">
      <button class="btn bg-gray-100 text-gray-600" onclick="hideStatusModal()">取消</button>
      <button class="btn btn-primary" onclick="updateStatus()">确认更新</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div id="deleteModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)hideDeleteModal()">
  <div class="modal">
    <h2 class="text-lg font-bold text-gray-800 mb-2">确认删除</h2>
    <p class="text-sm text-gray-500" id="deleteModalInfo"></p>
    <div class="flex justify-end gap-2 mt-5">
      <button class="btn bg-gray-100 text-gray-600" onclick="hideDeleteModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- app wrapper end -->
</div>

<script>
// ========== Supabase ==========
const SUPABASE_URL = 'https://jlzsonjjfgojmwgghxbl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsenNvbmpqZmdvam13Z2doeGJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MTY2ODksImV4cCI6MjA5MjQ5MjY4OX0.ZjSV3guUc21Dq5KWBydFyy-Ps7sBn2FlC3Wr5srgn9U';

function getSupabase() {
  if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
    return window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
  return null;
}

function requireSupabase() {
  const s = getSupabase();
  if (!s) { toast('数据库未就绪，请刷新页面'); throw new Error('Supabase not loaded'); }
  return s;
}

// ========== 状态配置 ==========
const STATUS_FLOWS = {
  '销毁': ['待处理', '已选择销毁'],
  '上门取件': ['待处理', '等待约上门取件', '已取货（但未支付运费）', '已发走', '已退款'],
  '自行寄回': ['待处理', '已约退货并提供地址', '已取件', '已回填单号', '已退款'],
  '暂存仓库': ['待处理', '已有新订单并预报', '已发走']
};
const ALL_STATUSES = [...new Set(Object.values(STATUS_FLOWS).flat())];

function getStatusBadgeClass(s) {
  if (s === '已退款' || s === '已完成') return 'badge-status-done';
  if (s === '待处理' || s === '已选择销毁') return 'badge-status-default';
  if (s === '已取货（但未支付运费）') return 'badge-status-warn';
  return 'badge-status-progress';
}
function getStrategyBadgeClass(s) {
  const m = { '销毁':'badge-strategy-destroy', '上门取件':'badge-strategy-pickup', '自行寄回':'badge-strategy-self', '暂存仓库':'badge-strategy-warehouse' };
  return m[s] || '';
}

// ========== 状态 ==========
let allOrders = [];
let editingOrderId = null;
let deletingOrderId = null;

// ========== 工具 ==========
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.cssText = 'display:block;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e293b;color:#fff;padding:14px 28px;border-radius:10px;font-size:15px;z-index:9999;pointer-events:none;';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 2000);
}

function formatTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ========== 搜索 ==========
function getFilteredOrders() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const strategy = document.getElementById('filterStrategy').value;
  const status = document.getElementById('filterStatus').value;
  return allOrders.filter(o => {
    if (search) {
      const no = (o.order_no || '').toLowerCase();
      const trk = (o.tracking_no || '').toLowerCase();
      const acc = (o.account || '').toLowerCase();
      if (no !== search && trk !== search && acc !== search) return false;
    }
    if (strategy && o.strategy !== strategy) return false;
    if (status && o.status !== status) return false;
    return true;
  });
}

// ========== 更新统计 ==========
function updateStats() {
  const total = allOrders.length;
  const pending = allOrders.filter(o => o.status === '待处理').length;
  const done = allOrders.filter(o => o.status === '已退款' || o.status === '已选择销毁').length;
  const progress = total - pending - done;
  document.getElementById('statsBar').innerHTML =
    `<span>共 <b class="text-gray-800">${total}</b> 条</span>` +
    `<span style="color:#f59e0b">● 待处理 <b>${pending}</b></span>` +
    `<span style="color:#3b82f6">● 处理中 <b>${progress}</b></span>` +
    `<span style="color:#10b981">● 已完成 <b>${done}</b></span>`;
  const ss = document.getElementById('filterStatus');
  const cv = ss.value;
  const used = [...new Set(allOrders.map(o => o.status))];
  ss.innerHTML = '<option value="">全部状态</option>' + ALL_STATUSES.filter(s => used.includes(s)).map(s => `<option value="${s}">${s}</option>`).join('');
  ss.value = used.includes(cv) ? cv : '';
}

// ========== 渲染 ==========
function renderOrders() {
  updateStats();
  const filtered = getFilteredOrders();
  const total = allOrders.length;

  if (total === 0) {
    document.getElementById('emptyState').style.display = 'block';
    document.querySelector('.table-col').style.display = 'none';
    document.getElementById('cardsView').style.display = 'none';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  if (window.innerWidth <= 768) {
    document.querySelector('.table-col').style.display = 'none';
    if (filtered.length === 0) {
      document.getElementById('cardsView').innerHTML = '<div class="text-center py-8 text-gray-400">没有匹配的订单</div>';
    } else {
      renderMobileCards(filtered);
    }
    document.getElementById('cardsView').style.display = 'block';
    return;
  }

  document.getElementById('cardsView').style.display = 'none';
  document.querySelector('.table-col').style.display = 'block';
  if (filtered.length === 0) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-400">没有匹配的订单</td></tr>';
    return;
  }
  document.getElementById('tableBody').innerHTML = filtered.map(o => `
    <tr class="border-b border-gray-50 hover:bg-gray-50/50">
      <td class="px-4 py-3 font-medium text-gray-800 text-sm">${escHtml(o.order_no)}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${escHtml(o.account || '—')}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${escHtml(o.tracking_no || '—')}</td>
      <td class="px-4 py-3"><span class="badge ${getStrategyBadgeClass(o.strategy)}">${o.strategy}</span></td>
      <td class="px-4 py-3"><span class="badge ${getStatusBadgeClass(o.status)}">${o.status}</span></td>
      <td class="px-4 py-3 text-sm text-gray-400">${formatTime(o.updated_at)}</td>
      <td class="px-4 py-3">
        <div class="flex gap-1">
          <button class="btn btn-sm bg-blue-50 text-blue-600" onclick="showStatusModal(${o.id})">状态</button>
          <button class="btn btn-sm bg-red-50 text-red-500" onclick="showDeleteModal(${o.id})"><i class="fa fa-trash"></i></button>
        </div>
      </td>
    </tr>`).join('');
}

function renderMobileCards(filtered) {
  document.getElementById('cardsView').innerHTML = filtered.map(o => `
    <div class="order-card">
      <div class="card-row">
        <span class="card-label">订单</span>
        <span class="card-value" style="font-weight:600;color:#1e293b;">${escHtml(o.order_no)}</span>
        <span class="badge ${getStrategyBadgeClass(o.strategy)}" style="margin-left:auto;">${o.strategy}</span>
      </div>
      ${o.account ? `<div class="card-row"><span class="card-label">账号</span><span class="card-value">${escHtml(o.account)}</span></div>` : ''}
      ${o.tracking_no ? `<div class="card-row"><span class="card-label">快递</span><span class="card-value" style="font-family:monospace;">${escHtml(o.tracking_no)}</span></div>` : ''}
      <div class="card-row">
        <span class="card-label">状态</span>
        <span class="badge ${getStatusBadgeClass(o.status)}">${o.status}</span>
        <span style="margin-left:auto;font-size:12px;color:#94a3b8;">${formatTime(o.updated_at)}</span>
      </div>
      <div class="card-actions">
        <button class="btn btn-sm flex-1" style="background:#eff6ff;color:#2563eb;" onclick="showStatusModal(${o.id})">更新状态</button>
        <button class="btn btn-sm" style="background:#fef2f2;color:#dc2626;" onclick="showDeleteModal(${o.id})"><i class="fa fa-trash"></i></button>
      </div>
    </div>`).join('');
}

// ========== 数据加载 ==========
async function loadOrders() {
  const supabase = getSupabase();
  if (!supabase) {
    document.getElementById('loading').innerHTML = '<div class="text-red-400">数据库加载失败，请刷新重试</div>';
    return;
  }
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').innerHTML = '<div class="skeleton-bar"></div><div class="skeleton-bar w-3/4"></div><div class="skeleton-bar w-1/2"></div>';
  try {
    const { data, error } = await supabase
      .from('orders')
      .select('id,order_no,account,tracking_no,strategy,status,updated_at')
      .order('updated_at', { ascending: false })
      .limit(100);

    document.getElementById('loading').style.display = 'none';
    if (error) { document.getElementById('loading').innerHTML = '<div class="text-red-400">加载失败</div>'; return; }

    allOrders = data || [];
    const now = new Date();
    const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    document.getElementById('lastRefresh').textContent = ts;
    renderOrders();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<div class="text-red-400">网络错误，请检查网络后刷新</div>';
  }
}

function refreshOrders() { location.reload(); }

// ========== 新建订单 ==========
function showCreateModal() {
  document.getElementById('createOrderNo').value = '';
  document.getElementById('createAccount').value = '';
  document.getElementById('createTrackingNo').value = '';
  document.getElementById('createStrategy').value = '';
  document.getElementById('createModal').style.display = 'flex';
}
function hideCreateModal() { document.getElementById('createModal').style.display = 'none'; }

// 自动匹配购买人
let buyerCache = null;
let buyerCacheLoading = false;
let buyerCacheError = null;

async function loadBuyerCache() {
  if (buyerCache) return buyerCache;
  if (buyerCacheLoading) {
    // 等待正在进行的加载
    let retries = 0;
    while (buyerCacheLoading && retries < 50) {
      await new Promise(r => setTimeout(r, 200));
      retries++;
    }
    return buyerCache || {};
  }

  buyerCacheLoading = true;
  try {
    const supabase = getSupabase();
    if (!supabase) {
      console.log('[自动填充] Supabase 未就绪');
      return {};
    }

    // 分页获取全部记录（Supabase 默认每页最多 1000 条）
    let allData = [];
    let from = 0;
    const pageSize = 1000;
    while (true) {
      const { data, error } = await supabase
        .from('buyer_mapping')
        .select('order_no,account')
        .range(from, from + pageSize - 1)
        .order('id', { ascending: true });
      if (error) {
        console.error('[自动填充] 加载买家缓存失败:', error);
        buyerCacheError = error;
        return {};
      }
      if (!data || data.length === 0) break;
      allData = allData.concat(data);
      if (data.length < pageSize) break;
      from += pageSize;
    }

    buyerCache = {};
    allData.forEach(d => {
      const key = (d.order_no || '').trim();
      if (key) buyerCache[key] = (d.account || '').trim();
    });
    console.log(`[自动填充] 买家缓存已加载，共 ${Object.keys(buyerCache).length} 条记录`);
    return buyerCache;
  } catch (e) {
    console.error('[自动填充] 加载买家缓存异常:', e);
    buyerCacheError = e;
    return {};
  } finally {
    buyerCacheLoading = false;
  }
}

let autoFillTimer;
function debounceAutoFill() {
  clearTimeout(autoFillTimer);
  autoFillTimer = setTimeout(autoFillBuyer, 400);
}

async function autoFillBuyer() {
  const orderNo = document.getElementById('createOrderNo').value.trim();
  if (!orderNo || orderNo.length < 5) return;
  // 如果购买账号已经手动填写，不覆盖
  const accountInput = document.getElementById('createAccount');
  if (accountInput.value.trim()) return;

  const cache = await loadBuyerCache();
  const account = cache[orderNo];
  if (account) {
    accountInput.value = account;
    accountInput.style.background = '#f0fdf4';
    setTimeout(() => accountInput.style.background = '', 1500);
    console.log(`[自动填充] ✅ 匹配成功: ${orderNo} → ${account}`);
  } else {
    console.log(`[自动填充] ❌ 未匹配: "${orderNo}" (缓存共 ${Object.keys(cache).length} 条)`);
    // 尝试模糊匹配：去除前后空格、统一破折号
    const normalized = orderNo.replace(/[-－]/g, '-').replace(/\s+/g, '');
    for (const [key, val] of Object.entries(cache)) {
      if (key.replace(/[-－]/g, '-').replace(/\s+/g, '') === normalized) {
        accountInput.value = val;
        accountInput.style.background = '#f0fdf4';
        setTimeout(() => accountInput.style.background = '', 1500);
        console.log(`[自动填充] ✅ 归一化后匹配成功: "${orderNo}" → "${key}" → ${val}`);
        return;
      }
    }
  }
}
// 预加载缓存（延迟确保 Supabase SDK 就绪）
setTimeout(() => { loadBuyerCache().catch(e => console.error('[自动填充] 预加载失败:', e)); }, 500);

async function createOrder() {
  const orderNo = document.getElementById('createOrderNo').value.trim();
  const account = document.getElementById('createAccount').value.trim();
  const trackingNo = document.getElementById('createTrackingNo').value.trim();
  const strategy = document.getElementById('createStrategy').value;
  if (!orderNo) return toast('请输入订单编号');
  if (!strategy) return toast('请选择处理策略');

  const { data: existing } = await requireSupabase().from('orders').select('id').eq('order_no', orderNo).limit(1);
  if (existing && existing.length > 0) return toast('该订单编号已存在');

  const { error } = await requireSupabase().from('orders').insert({
    order_no: orderNo, account, tracking_no: trackingNo, strategy, status: '待处理'
  });
  if (error) return toast('创建失败: ' + error.message);

  const { data: newOrders } = await requireSupabase().from('orders').select('id,order_no,account,tracking_no,strategy,status,updated_at').eq('order_no', orderNo).limit(1);
  if (newOrders && newOrders.length > 0) { allOrders.unshift(newOrders[0]); renderOrders(); }
  toast('订单已创建');
  hideCreateModal();
}

// ========== 更新状态 ==========
function showStatusModal(orderId) {
  const order = allOrders.find(o => o.id === orderId);
  if (!order) return;
  editingOrderId = orderId;
  document.getElementById('statusModalOrderInfo').textContent = `订单：${order.order_no} | 当前状态：${order.status}`;
  const flows = STATUS_FLOWS[order.strategy] || [];
  const idx = flows.indexOf(order.status);
  const options = idx >= 0 ? flows.slice(idx + 1) : flows;
  document.getElementById('newStatus').innerHTML = options.length === 0
    ? '<option value="">已是最终状态</option>'
    : options.map(s => `<option value="${s}">${s}</option>`).join('');
  document.getElementById('statusModal').style.display = 'flex';
}
function hideStatusModal() { document.getElementById('statusModal').style.display = 'none'; editingOrderId = null; }

async function updateStatus() {
  const newStatus = document.getElementById('newStatus').value;
  if (!newStatus) return toast('请选择新状态');
  const { error } = await requireSupabase().from('orders').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', editingOrderId);
  if (error) return toast('更新失败: ' + error.message);
  const idx = allOrders.findIndex(o => o.id === editingOrderId);
  if (idx >= 0) { allOrders[idx].status = newStatus; allOrders[idx].updated_at = new Date().toISOString(); }
  hideStatusModal();
  requestAnimationFrame(() => { renderOrders(); toast('状态已更新'); });
}

// ========== 删除 ==========
function showDeleteModal(orderId) {
  const order = allOrders.find(o => o.id === orderId);
  if (!order) return;
  deletingOrderId = orderId;
  document.getElementById('deleteModalInfo').textContent = `确定删除订单「${order.order_no}」吗？此操作不可恢复。`;
  document.getElementById('deleteModal').style.display = 'flex';
}
function hideDeleteModal() { document.getElementById('deleteModal').style.display = 'none'; deletingOrderId = null; }

async function confirmDelete() {
  const { error } = await requireSupabase().from('orders').delete().eq('id', deletingOrderId);
  if (error) return toast('删除失败: ' + error.message);
  allOrders = allOrders.filter(o => o.id !== deletingOrderId);
  hideDeleteModal();
  // 移动端需要强制 DOM 刷新，确保卡片立即消失
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    document.getElementById('cardsView').style.display = 'none';
    document.getElementById('cardsView').innerHTML = '';
  }
  // 用 RAF 确保浏览器完成重排后再渲染
  requestAnimationFrame(() => {
    renderOrders();
    if (isMobile) document.getElementById('cardsView').style.display = 'block';
    toast('订单已删除');
  });
}

// ========== 搜索监听 ==========
document.getElementById('searchInput').addEventListener('input', renderOrders);
window.addEventListener('resize', renderOrders);

// ========== 启动 ==========
setTimeout(() => {
  const loading = document.getElementById('loading');
  if (loading.style.display !== 'none') loading.innerHTML = '<div class="text-amber-500">加载超时，请<a href="javascript:location.reload()" class="underline text-blue-500">刷新</a></div>';
}, 10000);
loadOrders().then(() => {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'block';
});
</script>
