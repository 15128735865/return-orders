<!-- 主界面 -->

<!-- Header -->
<header class="bg-white shadow-sm sticky top-0 z-40">

    <div class="flex items-center gap-2">
      <h1 class="text-lg md:text-xl font-bold text-gray-800">📦 退货订单管理</h1>
      <button onclick="refreshOrders()" id="refreshBtn" class="btn btn-sm bg-gray-100 text-gray-500" title="刷新数据">
        <i class="fa fa-refresh"></i> <span class="text-xs" id="lastRefresh"></span>
      </button>
      <button onclick="syncImages()" id="syncBtn" class="btn btn-sm bg-green-50 text-green-600" title="同步缺失的商品图片">
        <i class="fa fa-cloud-download"></i> <span class="hidden md:inline text-xs">同步图片</span>
      </button>
      <button onclick="syncExcel()" id="syncExcelBtn" class="btn btn-sm bg-purple-50 text-purple-600" title="导入 Excel 数据">

        <option value="上门取件">上门取件</option>
        <option value="自行寄回">自行寄回</option>
        <option value="暂存仓库">暂存仓库</option>
      </select>
      <select id="filterStatus" class="input w-auto min-w-[110px]" onchange="renderOrders()">
        <option value="">全部状态</option>
      </select>
    </div>
  </div>

  <!-- Stats -->
  <div id="statsBar" class="flex flex-wrap gap-3 mb-4 text-sm text-gray-500"></div>

  <!-- Loading -->
  <div id="loading" class="text-center py-12 text-gray-400"></div>

  <!-- Table (Desktop) -->

    <div class="overflow-x-auto">
      <table class="w-full">

<!-- Create Modal -->
<div id="createModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)hideCreateModal()">
  <div class="modal">
    <h2 class="text-lg font-bold text-gray-800 mb-4" id="createModalTitle">新建订单</h2>
    <div class="space-y-3">
      <div>
        <label class="text-sm text-gray-600 mb-1 block">订单编号 <span class="text-red-400">*</span></label>
        <input id="createOrderNo" class="input" placeholder="输入订单编号" oninput="debounceAutoFill()" onfocus="loadBuyerCache(true).then(()=>smartRender())">

      <div>
        <label class="text-sm text-gray-600 mb-1 block">购买账号</label>
        <input id="createAccount" class="input" placeholder="输入购买账号（选填）">
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">国内快递单号</label>
        <input id="createTrackingNo" class="input" placeholder="输入国内快递单号（选填）">
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">处理策略 <span class="text-red-400">*</span></label>

          <option value="销毁">销毁</option>
          <option value="上门取件">上门取件</option>

<div id="deleteModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)hideDeleteModal()">

<script>
// ========== Supabase ==========
// 版本检测：强制清除旧缓存
const APP_VERSION = '20260601-v6';
(function checkVersion() {
  const stored = localStorage.getItem('app_version');
  if (stored && stored !== APP_VERSION) {
    // 版本变化，清除所有缓存后刷新
    localStorage.clear();
    sessionStorage.clear();
    location.reload(true);
    return;
  }
  localStorage.setItem('app_version', APP_VERSION);
})();

const SUPABASE_URL = 'https://jlzsonjjfgojmwgghxbl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsenNvbmpqZmdvam13Z2doeGJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MTY2ODksImV4cCI6MjA5MjQ5MjY4OX0.ZjSV3guUc21Dq5KWBydFyy-Ps7sBn2FlC3Wr5srgn9U';

function getSupabase() {
  if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
    return window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
  return null;
}

function requireSupabase() {
  const s = getSupabase();
  if (!s) { toast('数据库未就绪，请刷新页面'); throw new Error('Supabase not loaded'); }
  return s;
}

// ========== 状态配置 ==========
const STATUS_FLOWS = {
  '销毁': ['待处理', '已选择销毁'],
  '上门取件': ['待处理', '等待约上门取件', '已取货（但未支付运费）', '已发走', '已退款'],
  '自行寄回': ['待处理', '已约退货并提供地址', '已取件', '已回填单号', '已退款'],
  '暂存仓库': ['待处理', '已有新订单并预报', '已发走']
};
const ALL_STATUSES = [...new Set(Object.values(STATUS_FLOWS).flat())];

function getStatusBadgeClass(s) {
  if (s === '已退款' || s === '已完成') return 'badge-status-done';
  if (s === '待处理' || s === '已选择销毁') return 'badge-status-default';
  if (s === '已取货（但未支付运费）') return 'badge-status-warn';
  return 'badge-status-progress';
}
function getStrategyBadgeClass(s) {
  const m = { '销毁':'badge-strategy-destroy', '上门取件':'badge-strategy-pickup', '自行寄回':'badge-strategy-self', '暂存仓库':'badge-strategy-warehouse' };
  return m[s] || '';
}

// ========== 状态 ==========
let allOrders = [];
let editingOrderId = null;
let deletingOrderId = null;

// ========== 工具 ==========
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.cssText = 'display:block;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e293b;color:#fff;padding:14px 28px;border-radius:10px;font-size:15px;z-index:9999;pointer-events:none;';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 2000);
}

function formatTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ========== 搜索 ==========
function getFilteredOrders() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const strategy = document.getElementById('filterStrategy').value;
  const status = document.getElementById('filterStatus').value;
  return allOrders.filter(o => {
    if (search) {
      const no = (o.order_no || '').toLowerCase();
      const trk = (o.tracking_no || '').toLowerCase();
      const acc = (o.account || '').toLowerCase();
      if (no !== search && trk !== search && acc !== search) return false;
    }
    if (strategy && o.strategy !== strategy) return false;
    if (status && o.status !== status) return false;
    return true;
  });
}

// ========== 更新统计 ==========
function updateStats() {
  const total = allOrders.length;
  const pending = allOrders.filter(o => o.status === '待处理').length;
  const done = allOrders.filter(o => o.status === '已退款' || o.status === '已选择销毁').length;
  const progress = total - pending - done;
  document.getElementById('statsBar').innerHTML =
    `<span>共 <b class="text-gray-800">${total}</b> 条</span>` +
    `<span style="color:#f59e0b">● 待处理 <b>${pending}</b></span>` +
    `<span style="color:#3b82f6">● 处理中 <b>${progress}</b></span>` +
    `<span style="color:#10b981">● 已完成 <b>${done}</b></span>`;
  const ss = document.getElementById('filterStatus');
  const cv = ss.value;
  const used = [...new Set(allOrders.map(o => o.status))];
  ss.innerHTML = '<option value="">全部状态</option>' + ALL_STATUSES.filter(s => used.includes(s)).map(s => `<option value="${s}">${s}</option>`).join('');
  ss.value = used.includes(cv) ? cv : '';
}

// ========== 渲染 ==========
function renderOrders() {
  updateStats();
  const filtered = getFilteredOrders();
  const total = allOrders.length;
  const cache = buyerCache || {};

  if (total === 0) {
    document.getElementById('emptyState').style.display = 'block';
    document.querySelector('.table-col').style.display = 'none';
    document.getElementById('cardsView').style.display = 'none';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  // 优先使用缓存数据
  const getAccount = o => (cache[o.order_no] && cache[o.order_no].account) || o.account || '';
  const getTracking = o => (cache[o.order_no] && cache[o.order_no].tracking_no) || o.tracking_no || '';
  const getCost = o => (cache[o.order_no] && cache[o.order_no].cost) || '';
  const getImage = o => (cache[o.order_no] && cache[o.order_no].image_url) || '';
  const getProduct = o => (cache[o.order_no] && cache[o.order_no].product_name) || '';

    document.querySelector('.table-col').style.display = 'none';
    if (filtered.length === 0) {
      document.getElementById('cardsView').innerHTML = '<div class="text-center py-8 text-gray-400">没有匹配的订单</div>';

      renderMobileCards(filtered, cache);
    }
    document.getElementById('cardsView').style.display = 'block';
    return;
  }

  document.querySelector('.table-col').style.display = 'block';

    document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="text-center py-8 text-gray-400">没有匹配的订单</td></tr>';

      <td class="px-3 py-2.5">
        ${img ? `<img src="${img.replace(/"/g,'&quot;')}" class="w-9 h-9 rounded-lg object-cover border border-gray-100" onerror="this.parentElement.innerHTML='<div class=\\'w-9 h-9 rounded-lg bg-gray-100 flex items-center justify-center\\'><i class=\\'fa fa-image text-gray-300 text-xs\\'></i></div>'" loading="lazy">` : `<div class="w-9 h-9 rounded-lg bg-gray-100 flex items-center justify-center"><i class="fa fa-image text-gray-300 text-xs"></i></div>`}
      </td>
      <td class="px-2 py-2.5">
        <div class="font-medium text-gray-800 text-sm">${escHtml(o.order_no)}</div>
        ${prod ? `<div class="text-xs text-gray-400 truncate max-w-[180px]" title="${escHtml(prod)}">${escHtml(prod.length > 20 ? prod.slice(0,20)+'...' : prod)}</div>` : ''}
      </td>
      <td class="px-2 py-2.5 text-sm text-gray-600 max-w-[100px] truncate" title="${escHtml(getAccount(o) || '')}">${escHtml(getAccount(o) || '—')}</td>
      <td class="px-2 py-2.5 text-sm">${tracking ? `<a href="https://www.baidu.com/s?wd=${encodeURIComponent(tracking)}" target="_blank" class="tracking-link text-xs">${escHtml(tracking.length > 18 ? tracking.slice(0,18)+'...' : tracking)}</a>` : `<span class="text-gray-300">—</span>`}</td>
      <td class="px-2 py-2.5 text-sm font-mono text-gray-700">${cost ? `¥${fmtCost(cost)}` : `<span class="text-gray-300">—</span>`}</td>
      <td class="px-2 py-2.5"><span class="badge ${getStrategyBadgeClass(o.strategy)} text-xs">${o.strategy}</span></td>
      <td class="px-2 py-2.5"><span class="badge ${getStatusBadgeClass(o.status)} text-xs">${o.status}</span></td>

        </div>
      </td>
    </tr>`;
  }).join('');
  // 更新缓存指纹，避免自动刷新时重复渲染
  if (buyerCache) _prevCacheFingerprint = cacheFingerprint(buyerCache);
}

// ========== 数据加载 ==========
async function loadOrders() {
  const supabase = getSupabase();
  if (!supabase) {
    document.getElementById('loading').innerHTML = '<div class="text-red-400">数据库加载失败，请刷新重试</div>';
    return;
  }
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').innerHTML = '<div class="skeleton-bar"></div><div class="skeleton-bar w-3/4"></div><div class="skeleton-bar w-1/2"></div>';
  try {
    const { data, error } = await supabase
      .from('orders')
      .select('id,order_no,account,tracking_no,strategy,status,updated_at')
      .order('updated_at', { ascending: false })
      .limit(100);

    document.getElementById('loading').style.display = 'none';
    if (error) { document.getElementById('loading').innerHTML = '<div class="text-red-400">加载失败</div>'; return; }

    allOrders = data || [];
    const now = new Date();
    const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    document.getElementById('lastRefresh').textContent = ts + ' · v' + APP_VERSION;
    renderOrders();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<div class="text-red-400">网络错误，请检查网络后刷新</div>';
  }
}

const LOCAL_SYNC_URL = 'http://localhost:8765';

async function syncImages() {
  const modal = document.getElementById('syncModal');
  const bar = document.getElementById('syncProgressBar');
  const percent = document.getElementById('syncPercent');
  const count = document.getElementById('syncCount');
  const found = document.getElementById('syncFound');
  const status = document.getElementById('syncStatus');
  const log = document.getElementById('syncLog');

  modal.style.display = 'flex';
  bar.style.width = '0%';
  percent.textContent = '0%';
  count.textContent = '—';
  found.textContent = '';
  status.textContent = '正在连接本地同步服务...';
  log.innerHTML = '';

  function appendLog(msg) {
    const div = document.createElement('div');
    div.textContent = msg;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  // 先检测本地服务是否可用
  try {
    const ping = await fetch(`${LOCAL_SYNC_URL}/ping`);
    if (!ping.ok) throw new Error('服务不可用');
    appendLog('✅ 已连接本地同步服务');
  } catch (e) {
    status.textContent = '⚠️ 本地同步服务未启动';
    status.className = 'text-xs text-amber-600 mb-3';
    appendLog('本地服务未运行，请先启动 sync_server.py');
    appendLog('');
    appendLog('系统每天 6:00 / 18:00 自动同步');
    appendLog('或双击运行 sync_images.bat 手动同步');
    return;
  }

  // 启动 SSE 同步
  status.textContent = '正在同步中...';
  try {
    const resp = await fetch(`${LOCAL_SYNC_URL}/sync`);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          appendLog(data.text);

          if (data.type === 'progress') {
            bar.style.width = data.percent + '%';
            percent.textContent = data.percent + '%';
            count.textContent = `${data.current} / ${data.total}`;
            found.innerHTML = `<i class="fa fa-image"></i> ${data.found} 张`;
            status.textContent = `正在同步 ${data.current}/${data.total}`;
          } else if (data.type === 'done') {
            bar.style.width = '100%';
            percent.textContent = '100%';
            status.textContent = '同步完成！';
            status.className = 'text-xs text-green-600 mb-3';
            // 刷新缓存
            buyerCache = null;
            _prevCacheFingerprint = '';
            await loadBuyerCache(true);
            requestAnimationFrame(renderOrders);
            appendLog('');
            appendLog('✅ 图片缓存已刷新');
          } else if (data.type === 'error') {
            status.textContent = '同步出错';
            status.className = 'text-xs text-red-500 mb-3';
          }
        } catch (parseErr) {
          // skip parse errors
        }
      }
    }
  } catch (e) {
    appendLog('❌ 连接失败: ' + e.message);
    status.textContent = '连接中断';
    status.className = 'text-xs text-red-500 mb-3';
  }
}

async function loadExcelConfig() {
  const list = document.getElementById('excelFileList');
  const status = document.getElementById('watchStatus');
  try {
    const resp = await fetch(`${LOCAL_SYNC_URL}/excel-config`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get' })
    });
    const config = await resp.json();
    const files = config.excel_files || [];

    if (files.length === 0) {
      list.innerHTML = '<div class="text-xs text-gray-400 text-center py-4">暂无配置文件，请添加 Excel 路径</div>';
    } else {
      list.innerHTML = files.map((f, i) => `
        <div class="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2">
          <div class="flex-1 min-w-0">
            <div class="text-sm text-gray-700 truncate" title="${escHtml(f.path)}">${escHtml(f.filename || f.path)}</div>
            <div class="text-xs ${f.exists ? 'text-green-500' : 'text-red-400'}">
              ${f.exists ? '已检测到文件' : '文件不存在'}
              ${f.mtime ? ' · ' + f.mtime : ''}
            </div>
          </div>
          <div class="flex gap-1 ml-2">
            <label class="cursor-pointer text-blue-500 hover:text-blue-700" title="上传替换文件">
              <i class="fa fa-upload"></i>
              <input type="file" accept=".xlsx,.xls" style="display:none" onchange="uploadExcelFile(${i}, this)">
            </label>
            <button class="text-gray-400 hover:text-red-500" data-path="${escHtml(f.path)}" onclick="removeExcelPath(this.dataset.path)" title="移除"><i class="fa fa-times"></i></button>
          </div>
        </div>
      `).join('');
    }

    const watching = files.filter(f => f.exists);
    status.textContent = `监控中: ${watching.length} 个文件 · 每 3 秒检测一次`;

    // 加载同步历史
    try {
      const logResp = await fetch(`${LOCAL_SYNC_URL}/sync-log`);
      const logData = await logResp.json();
      const logs = logData.log || [];
      if (logs.length > 0) {
        document.getElementById('syncHistory').classList.remove('hidden');
        const historyList = document.getElementById('syncHistoryList');
        historyList.innerHTML = logs.slice(0, 8).map(l => {
          const icon = l.status === 'ok' ? '✅' : l.status === 'error' ? '❌' : '🔄';
          const source = l.source === 'auto' ? '自动' : '手动';
          let detail = '';
          if (l.new || l.updated) {
            detail = ` (新增${l.new || 0} 更新${l.updated || 0})`;
          }
          return `<div>${icon} ${l.time} [${source}] ${l.file}${detail}</div>`;
        }).join('');
      }
    } catch (e) {}
  } catch (e) {
    list.innerHTML = '<div class="text-xs text-red-400 text-center py-4">无法连接本地服务</div>';
    status.textContent = '⚠️ 服务未连接';
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadExcelToServer(file, target, filename) {
  const base64 = await fileToBase64(file);
  const resp = await fetch(`${LOCAL_SYNC_URL}/upload-excel`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ file_data: base64, target: target, filename: filename })
  });
  return resp.json();
}

async function uploadExcelFile(index, input) {
  const file = input.files[0];
  if (!file) return;
  toast('正在上传...');
  try {
    const result = await uploadExcelToServer(file, String(index), file.name);
    if (result.ok) {
      toast(`${result.filename} 上传成功，自动导入中...`);
      loadExcelConfig();
    } else {
      toast('上传失败: ' + (result.error || '未知错误'));
    }
  } catch (e) {
    toast('上传失败: ' + e.message);
  }
  input.value = '';
}

async function removeExcelPath(path) {

      method: 'POST',

async function syncExcel(filepath) {
  const { bar, percent, count, found, status, log } = showSyncModalFor('excel');
  status.textContent = '正在连接本地同步服务...';
  log.innerHTML = '';

  function addLog(msg) {
    const div = document.createElement('div');
    div.textContent = msg;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  try {
    const ping = await fetch(`${LOCAL_SYNC_URL}/ping`);
    if (!ping.ok) throw new Error('服务不可用');
    addLog('✅ 已连接本地同步服务');
  } catch (e) {
    status.textContent = '⚠️ 本地同步服务未启动';
    addLog('请先启动本地同步服务器');
    return;
  }

  status.textContent = '正在导入 Excel...';
  found.textContent = '';

  const url = filepath ? `${LOCAL_SYNC_URL}/sync-excel?path=${encodeURIComponent(filepath)}` : `${LOCAL_SYNC_URL}/sync-excel`;

  try {
    const resp = await fetch(url);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          addLog(data.text);
          if (data.type === 'progress' && data.percent !== undefined) {
            bar.style.width = data.percent + '%';
            percent.textContent = data.percent + '%';
            if (data.total) {
              count.textContent = `${data.current || 0} / ${data.total}`;
            }
          }
          if (data.type === 'done') {
            bar.style.width = '100%';
            percent.textContent = '100%';
            status.textContent = '导入完成！';
            status.className = 'text-xs text-green-600 mb-3';
            buyerCache = null;
            _prevCacheFingerprint = '';
            await loadBuyerCache(true);
            requestAnimationFrame(renderOrders);
            addLog('✅ 买家缓存已更新');
          }
          if (data.type === 'error') {
            status.textContent = '导入出错';
            status.className = 'text-xs text-red-500 mb-3';
          }
        } catch (parseErr) {}
      }
    }
  } catch (e) {
    addLog('❌ 连接中断: ' + e.message);
    status.textContent = '连接中断';
    status.className = 'text-xs text-red-500 mb-3';
  }
}

function showCreateModal() {
  document.getElementById('createOrderNo').value = '';
  document.getElementById('createAccount').value = '';
  document.getElementById('createTrackingNo').value = '';
  document.getElementById('createStrategy').value = '';
  document.getElementById('createModal').style.display = 'flex';

function hideCreateModal() { document.getElementById('createModal').style.display = 'none'; }

// 自动匹配购买人
let buyerCache = null;
let buyerCacheLoading = false;
let _prevCacheFingerprint = '';
const BUYER_CACHE_KEY = 'return_app_buyer_cache';
const BUYER_CACHE_TIME_KEY = 'return_app_buyer_cache_time';
const CACHE_TTL = 20 * 1000; // 20 秒，localStorage 有效期

function cacheFingerprint(cache) {
  const keys = Object.keys(cache);
  let tracking = 0, account = 0, image = 0;
  for (let i = 0; i < keys.length; i++) {
    const v = cache[keys[i]];
    if (v.tracking_no) tracking++;
    if (v.account) account++;
    if (v.image_url) image++;
  }
  return `${keys.length}:${tracking}:${account}:${image}`;
}

function smartRender() {
  if (!buyerCache) { requestAnimationFrame(renderOrders); return; }
  const fp = cacheFingerprint(buyerCache);
  if (fp !== _prevCacheFingerprint) {
    _prevCacheFingerprint = fp;
    requestAnimationFrame(renderOrders);
  }
}

async function loadBuyerCache(forceRefresh = false) {
  // 不强制刷新时，直接返回内存缓存
  if (buyerCache && !forceRefresh) return buyerCache;

  // 等待正在进行的加载
  if (buyerCacheLoading) {
    let retries = 0;
    while (buyerCacheLoading && retries < 50) {
      await new Promise(r => setTimeout(r, 200));
      retries++;
    }
    // 如果等待后缓存已就绪且不强制刷新，直接返回
    if (buyerCache && !forceRefresh) return buyerCache;
  }

  // 不强制刷新时，优先使用 localStorage 快速显示
  if (!forceRefresh) {
    try {
      const cachedTime = localStorage.getItem(BUYER_CACHE_TIME_KEY);
      const cachedData = localStorage.getItem(BUYER_CACHE_KEY);
      if (cachedTime && cachedData) {
        const age = Date.now() - parseInt(cachedTime);
        if (age < CACHE_TTL) {
          buyerCache = JSON.parse(cachedData);
          // 缓存过半时，后台静默拉取最新数据
          if (age > CACHE_TTL / 2) {
            setTimeout(() => loadBuyerCache(true), 500);
          }
          return buyerCache;
        }
      }
    } catch (e) {}
  }

  // forceRefresh 或缓存过期：直接从 Supabase 拉取最新数据
  buyerCacheLoading = true;
  try {
    const supabase = getSupabase();
    if (!supabase) {
      // 降级到 localStorage
      if (!buyerCache) {
        try {
          const d = localStorage.getItem(BUYER_CACHE_KEY);
          if (d) buyerCache = JSON.parse(d);
        } catch (e) {}
      }
      return buyerCache || {};
    }

    let allData = [];
    let from = 0;
    const pageSize = 1000;
    while (true) {
      const { data, error } = await supabase
        .from('buyer_mapping')
        .select('order_no,account,tracking_no,product_name,cost,image_url,order_date')
        .range(from, from + pageSize - 1)
        .order('id', { ascending: true });
      if (error) {
        console.error('[缓存] 加载失败:', error);
        if (!buyerCache) {
          try {
            const d = localStorage.getItem(BUYER_CACHE_KEY);
            if (d) buyerCache = JSON.parse(d);
          } catch (e) {}
        }
        return buyerCache || {};
      }
      if (!data || data.length === 0) break;
      allData = allData.concat(data);
      if (data.length < pageSize) break;
      from += pageSize;
    }

    const newCache = {};
    allData.forEach(d => {
      const key = (d.order_no || '').trim();
      if (key) {
        newCache[key] = {
          account: (d.account || '').trim(),
          tracking_no: (d.tracking_no || '').trim(),
          product_name: (d.product_name || '').trim(),
          cost: (d.cost || '').trim(),
          image_url: (d.image_url || '').trim(),
          order_date: (d.order_date || '').trim()
        };
      }
    });
    buyerCache = newCache;

    // 同步到 localStorage
    try {
      localStorage.setItem(BUYER_CACHE_KEY, JSON.stringify(buyerCache));
      localStorage.setItem(BUYER_CACHE_TIME_KEY, String(Date.now()));
    } catch (e) {}

    const withTracking = allData.filter(d => d.tracking_no).length;
    const withImage = allData.filter(d => d.image_url).length;
    console.log(`[缓存] 已加载 ${Object.keys(buyerCache).length} 条（快递: ${withTracking}, 图片: ${withImage}）`);
    return buyerCache;
  } catch (e) {
    console.error('[缓存] 异常:', e);
    if (!buyerCache) {
      try {
        const d = localStorage.getItem(BUYER_CACHE_KEY);
        if (d) buyerCache = JSON.parse(d);
      } catch (e2) {}
    }
    return buyerCache || {};
  } finally {
    buyerCacheLoading = false;
  }
}

let autoFillTimer;
function debounceAutoFill() {
  clearTimeout(autoFillTimer);
  autoFillTimer = setTimeout(autoFillBuyer, 400);
}

async function autoFillBuyer() {
  const orderNo = document.getElementById('createOrderNo').value.trim();
  if (!orderNo || orderNo.length < 5) return;

  const accountInput = document.getElementById('createAccount');
  const trackingInput = document.getElementById('createTrackingNo');

  const cache = await loadBuyerCache();
  const info = cache[orderNo];

  if (info) {
    // 自动填充购买账号（不覆盖手动填写）
    if (info.account && !accountInput.value.trim()) {
      accountInput.value = info.account;
      accountInput.style.background = '#f0fdf4';
      setTimeout(() => accountInput.style.background = '', 1500);
      console.log(`[自动填充] ✅ 账号: ${orderNo} → ${info.account}`);
    }
    // 自动填充快递单号（不覆盖手动填写）
    if (info.tracking_no && !trackingInput.value.trim()) {
      trackingInput.value = info.tracking_no;
      trackingInput.style.background = '#f0fdf4';
      setTimeout(() => trackingInput.style.background = '', 1500);
      console.log(`[自动填充] ✅ 快递单号: ${orderNo} → ${info.tracking_no}`);
    }
    if (!info.account && !info.tracking_no) {
      console.log(`[自动填充] ⚠️ 订单号存在但无数据: "${orderNo}"`);
    }
    if (!info.account && !info.tracking_no) return;
  } else {
    console.log(`[自动填充] ❌ 未匹配: "${orderNo}" (缓存共 ${Object.keys(cache).length} 条)`);
    // 归一化重试
    const normalized = orderNo.replace(/[-－]/g, '-').replace(/\s+/g, '');
    for (const [key, val] of Object.entries(cache)) {
      if (key.replace(/[-－]/g, '-').replace(/\s+/g, '') === normalized) {
        if (val.account && !accountInput.value.trim()) {
          accountInput.value = val.account;
          accountInput.style.background = '#f0fdf4';
          setTimeout(() => accountInput.style.background = '', 1500);
        }
        if (val.tracking_no && !trackingInput.value.trim()) {
          trackingInput.value = val.tracking_no;
          trackingInput.style.background = '#f0fdf4';
          setTimeout(() => trackingInput.style.background = '', 1500);
        }
        console.log(`[自动填充] ✅ 归一化匹配: "${orderNo}" → "${key}"`);
        return;
      }
    }
  }
}
// 预加载缓存（延迟确保 Supabase SDK 就绪），加载完立即刷新列表
setTimeout(() => { loadBuyerCache().then(() => { smartRender(); }).catch(e => console.error('[自动填充] 预加载失败:', e)); }, 500);
// 每 10 秒自动刷新缓存，仅数据变化时才重新渲染（避免图片闪烁）
let _autoRefreshTimer = null;
function scheduleAutoRefresh() {
  clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(() => {
    if (document.hidden) return;
    loadBuyerCache(true).then(() => { smartRender(); }).catch(() => {});
  }, 10000);
}
scheduleAutoRefresh();

// 页面恢复可见时立即检查更新
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    loadBuyerCache(true).then(() => { smartRender(); }).catch(() => {});
  }
});

async function createOrder() {
  const orderNo = document.getElementById('createOrderNo').value.trim();
  const account = document.getElementById('createAccount').value.trim();
  const trackingNo = document.getElementById('createTrackingNo').value.trim();
  const strategy = document.getElementById('createStrategy').value;
  if (!orderNo) return toast('请输入订单编号');
  if (!strategy) return toast('请选择处理策略');

  const { data: existing } = await requireSupabase().from('orders').select('id').eq('order_no', orderNo).limit(1);
  if (existing && existing.length > 0) return toast('该订单编号已存在');

  const { error } = await requireSupabase().from('orders').insert({
    order_no: orderNo, account, tracking_no: trackingNo, strategy, status: '待处理'
  });
  if (error) return toast('创建失败: ' + error.message);

  const { data: newOrders } = await requireSupabase().from('orders').select('id,order_no,account,tracking_no,strategy,status,updated_at').eq('order_no', orderNo).limit(1);
  if (newOrders && newOrders.length > 0) { allOrders.unshift(newOrders[0]); renderOrders(); }
  toast('订单已创建');
  hideCreateModal();
}

// ========== 更新状态 ==========
function showStatusModal(orderId) {
  const order = allOrders.find(o => o.id === orderId);
  if (!order) return;
  editingOrderId = orderId;
  document.getElementById('statusModalOrderInfo').textContent = `订单：${order.order_no} | 当前状态：${order.status}`;
  const flows = STATUS_FLOWS[order.strategy] || [];
  const idx = flows.indexOf(order.status);
  const options = idx >= 0 ? flows.slice(idx + 1) : flows;
  document.getElementById('newStatus').innerHTML = options.length === 0
    ? '<option value="">已是最终状态</option>'
    : options.map(s => `<option value="${s}">${s}</option>`).join('');
  document.getElementById('statusModal').style.display = 'flex';
}
function hideStatusModal() { document.getElementById('statusModal').style.display = 'none'; editingOrderId = null; }

async function updateStatus() {
  const newStatus = document.getElementById('newStatus').value;
  if (!newStatus) return toast('请选择新状态');
  const { error } = await requireSupabase().from('orders').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', editingOrderId);
  if (error) return toast('更新失败: ' + error.message);
  const idx = allOrders.findIndex(o => o.id === editingOrderId);
  if (idx >= 0) { allOrders[idx].status = newStatus; allOrders[idx].updated_at = new Date().toISOString(); }
  hideStatusModal();
  requestAnimationFrame(() => { renderOrders(); toast('状态已更新'); });
}

// ========== 订单详情 ==========
function showDetailModal(orderId) {
  const order = allOrders.find(o => o.id === orderId);
  if (!order) return;

  const cache = buyerCache || {};
  const info = cache[order.order_no];

  const isEmpty = v => !v || v === '' || v === 'None';

  // 格式化成本显示
  function fmtCost(v) {
    if (isEmpty(v)) return null;
    const n = parseFloat(v);
    if (!isNaN(n)) return n.toFixed(2);
    return v;
  }

  const rows = [
    { label: '订单编号', value: order.order_no || '—' },
    { label: '购买账号', value: (info && info.account) || order.account || '—' },
    { label: '处理策略', value: order.strategy || '—', badge: getStrategyBadgeClass(order.strategy) },
    { label: '当前状态', value: order.status || '—', badge: getStatusBadgeClass(order.status) },
    { label: '国内快递', value: (info && info.tracking_no) || order.tracking_no || '—', isTracking: true },
  ];

  // Excel 匹配的详细信息
  if (info) {
    const costVal = fmtCost(info.cost);
    rows.push(
      { label: '订单日期', value: info.order_date || '—', isExtra: true },
      { label: '货物名称', value: info.product_name || '—', isExtra: true },
      { label: '成本', value: costVal ? `¥${costVal}` : '—', isExtra: true, highlight: !!costVal }
    );
  } else {
    rows.push(
      { label: '订单日期', value: '暂无匹配数据', isExtra: true, muted: true },
      { label: '货物名称', value: '—', isExtra: true, muted: true },
      { label: '成本', value: '—', isExtra: true, muted: true }
    );
  }

  // 商品图片
  const imageUrl = (info && info.image_url) || '';
  rows.push({ label: '商品图片', value: imageUrl, isImage: true });

  let html = '';
  for (const r of rows) {
    if (r.isImage) {
      html += `<div>
        <span class="text-xs text-gray-400 block mb-1">商品图片</span>`;
      if (r.value) {
        html += `<div style="background:#f8fafc;border-radius:8px;overflow:hidden;display:flex;justify-content:center;">
          <img src="${r.value.replace(/"/g,'&quot;')}" alt="商品图片" style="max-width:100%;max-height:280px;object-fit:contain;" onerror="this.parentElement.innerHTML='<div style=\\'padding:40px;color:#94a3b8;text-align:center;\\'><i class=\\'fa fa-image\\' style=\\'font-size:24px;margin-bottom:6px;display:block;\\'></i>图片加载失败</div>'">
        </div>`;
      } else {
        html += `<div style="background:#f8fafc;border:2px dashed #e2e8f0;border-radius:8px;height:100px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:13px;">
          <i class="fa fa-image" style="margin-right:6px;"></i>暂无商品图片
        </div>`;
      }
      html += `</div>`;
    } else {
      let vDisplay;
      if (r.isTracking && r.value !== '—') {
        vDisplay = `<a href="https://www.baidu.com/s?wd=${encodeURIComponent(r.value)}" target="_blank" class="tracking-link">${escHtml(r.value)}</a>`;
      } else {
        vDisplay = r.badge
          ? `<span class="badge ${r.badge}">${escHtml(r.value)}</span>`
          : `<span class="${r.muted ? 'text-gray-300' : r.isExtra ? 'text-gray-700' : 'text-gray-600'}">${escHtml(r.value)}${r.highlight ? '' : ''}</span>`;
      }
      const labelColor = r.isExtra ? 'text-indigo-500' : 'text-gray-400';
      html += `<div class="flex items-center gap-3">
        <span class="text-xs ${labelColor} min-w-[56px]">${r.label}</span>
        <span class="text-sm">${vDisplay}</span>
      </div>`;
    }
  }

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').style.display = 'flex';
}
function hideDetailModal() { document.getElementById('detailModal').style.display = 'none'; }

// ========== 删除 ==========
function showDeleteModal(orderId) {
  const order = allOrders.find(o => o.id === orderId);
  if (!order) return;
  deletingOrderId = orderId;
  document.getElementById('deleteModalInfo').textContent = `确定删除订单「${order.order_no}」吗？此操作不可恢复。`;
  document.getElementById('deleteModal').style.display = 'flex';
}
function hideDeleteModal() { document.getElementById('deleteModal').style.display = 'none'; deletingOrderId = null; }

async function confirmDelete() {
  const { error } = await requireSupabase().from('orders').delete().eq('id', deletingOrderId);
  if (error) return toast('删除失败: ' + error.message);
  allOrders = allOrders.filter(o => o.id !== deletingOrderId);
  hideDeleteModal();
  // 移动端需要强制 DOM 刷新，确保卡片立即消失
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    document.getElementById('cardsView').style.display = 'none';
    document.getElementById('cardsView').innerHTML = '';
  }
  // 用 RAF 确保浏览器完成重排后再渲染
  requestAnimationFrame(() => {
    renderOrders();
    if (isMobile) document.getElementById('cardsView').style.display = 'block';
    toast('订单已删除');
  });
}

document.getElementById('searchInput').addEventListener('input', renderOrders);
window.addEventListener('resize', renderOrders);

// ========== 启动 ==========
setTimeout(() => {
  const loading = document.getElementById('loading');
  if (loading.style.display !== 'none') loading.innerHTML = '<div class="text-amber-500">加载超时，请<a href="javascript:location.reload()" class="underline text-blue-500">刷新</a></div>';
}, 10000);
loadOrders().then(() => {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'block';
});
</script>
